project_name: rss-test-server

before:
  hooks:
    - go mod tidy

builds:
  - id: rss-test-server
    binary: rss-test-server
    main: .
    env:
      - CGO_ENABLED=0

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
